<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Coin base (circular foundation) -->
  <ellipse cx="150" cy="200" rx="75" ry="20" fill="#D9AB82"/>
  
  <!-- Coin rows -->
  <rect x="75" y="185" width="30" height="18" rx="2" fill="#F2BB77" stroke="#D9AB82" stroke-width="2"/>
  <rect x="110" y="185" width="30" height="18" rx="2" fill="#F2BB77" stroke="#D9AB82" stroke-width="2"/>
  <rect x="160" y="185" width="30" height="18" rx="2" fill="#F2BB77" stroke="#D9AB82" stroke-width="2"/>
  <rect x="195" y="185" width="30" height="18" rx="2" fill="#F2BB77" stroke="#D9AB82" stroke-width="2"/>
  
  <rect x="90" y="170" width="35" height="18" rx="2" fill="#F2BB77" stroke="#D9AB82" stroke-width="2"/>
  <rect x="130" y="170" width="40" height="18" rx="2" fill="#F2BB77" stroke="#D9AB82" stroke-width="2"/>
  <rect x="175" y="170" width="35" height="18" rx="2" fill="#F2BB77" stroke="#D9AB82" stroke-width="2"/>
  
  <!-- House body -->
  <rect x="100" y="100" width="100" height="75" rx="5" fill="#99BFBF" stroke="#395659" stroke-width="4"/>
  
  <!-- Roof (rounded top) -->
  <path d="M 95 100 Q 95 75 110 70 L 150 55 L 190 70 Q 205 75 205 100 Z" fill="#99BFBF" stroke="#395659" stroke-width="4"/>
  <path d="M 95 100 L 205 100" stroke="#395659" stroke-width="4"/>
  
  <!-- Window (4 panes) -->
  <rect x="130" y="110" width="40" height="35" rx="3" fill="#395659" stroke="#395659" stroke-width="2"/>
  <line x1="150" y1="110" x2="150" y2="145" stroke="#99BFBF" stroke-width="3"/>
  <line x1="130" y1="127.5" x2="170" y2="127.5" stroke="#99BFBF" stroke-width="3"/>
  
  <!-- Door -->
  <rect x="135" y="150" width="30" height="25" rx="15" rx="15" ry="0" fill="#395659"/>
  <rect x="135" y="150" width="30" height="25" fill="#395659"/>
  <path d="M 135 150 Q 135 145 150 145 Q 165 145 165 150 Z" fill="#395659"/>
  <circle cx="160" cy="162" r="2.5" fill="#F2BB77"/>
  
  <!-- Chimney/stem for leaves -->
  <rect x="155" y="65" width="12" height="20" fill="#99BFBF" stroke="#395659" stroke-width="3"/>
  
  <!-- Sprouting leaves -->
  <ellipse cx="145" cy="45" rx="18" ry="25" fill="#F2BB77" transform="rotate(-20 145 45)"/>
  <path d="M 147 55 Q 150 45 148 38" stroke="#395659" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <ellipse cx="175" cy="45" rx="18" ry="25" fill="#F2BB77" transform="rotate(20 175 45)"/>
  <path d="M 173 55 Q 170 45 172 38" stroke="#395659" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Leaf stems connecting to chimney -->
  <line x1="161" y1="65" x2="150" y2="50" stroke="#395659" stroke-width="3"/>
  <line x1="161" y1="65" x2="170" y2="50" stroke="#395659" stroke-width="3"/>
</svg>
